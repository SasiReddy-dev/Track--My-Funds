{% extends "finance_app/base.html" %}

{% block content %}
<div class="flex justify-center items-center min-h-screen bg-gray-100">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6">Login</h1>

    <!-- Error message -->
    {% if error %}
      <p class="text-red-500 mb-4 text-center">{{ error }}</p>
    {% endif %}

    <!-- Login Form -->
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username"
             class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      <input type="password" name="password" placeholder="Password"
             class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition">
        Login
      </button>
    </form>

    <!-- Register link -->
    <p class="text-sm text-center mt-4">
      Don't have an account? 
      <a href="{% url 'register' %}" class="text-blue-500 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}

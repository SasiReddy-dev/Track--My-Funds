{% extends "finance_app/base.html" %}

{% block content %}
<h2 class="mb-4">Edit Expense</h2>

<form method="POST" class="card p-4 shadow">
    {% csrf_token %}
    
    <div class="mb-3">
        <label>Title</label>
        {{ form.title }}
    </div>

    <div class="mb-3">
        <label>Amount</label>
        {{ form.amount }}
    </div>

    <div class="mb-3">
        <label>Category</label>
        {{ form.category }}
    </div>

    <div class="mb-3">
        <label>Date</label>
        {{ form.date }}
    </div>

    <button type="submit" class="btn btn-success">Update</button>
</form>

{% endblock %}
